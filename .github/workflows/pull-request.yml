---
name: Pull Request
on:
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    name: run-checks
    runs-on: ubuntu-latest
    env:
      # `make check` runs terraform init/validate + the terraform-format hook
      TF_IN_AUTOMATION: true
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      R4_LINODE_TOKEN: ${{ secrets.R4_LINODE_TOKEN }}
      R4_ANSIBLE_VAULT_KEY: ${{ secrets.R4_ANSIBLE_VAULT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: astral-sh/setup-uv@v5
      - name: Install pre-commit
        run: |
          make setup
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run checks
        run: make check
  terraform:
    name: Terraform plan
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_r4_linode_token: ${{ secrets.TF_VAR_R4_LINODE_TOKEN }}
    defaults:
      run:
        working-directory: terraform/
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Plan
        run: make plan
  ansible:
    name: Ansible diff
    runs-on: ubuntu-latest
    needs: terraform
    env:
      R4_ANSIBLE_VAULT_KEY: ${{ secrets.R4_ANSIBLE_VAULT_KEY }}
      R4_LINODE_TOKEN: ${{ secrets.R4_LINODE_TOKEN }}
    defaults:
      run:
        working-directory: ansible/
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ANSIBLE_USER_PRIVATE_SSH_KEY }}
      - uses: astral-sh/setup-uv@v5
      - name: Add uv tool bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Ansible Diff (PR preview)
        run: make diff SSH_USER=ansible
