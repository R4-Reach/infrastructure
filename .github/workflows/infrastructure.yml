---
name: Infrastructure
on:
  push:
    branches: [main]
  workflow_dispatch:  # manual run on any branch — treated as apply if on main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  terraform:
    name: Terraform ${{ github.ref == 'refs/heads/main' && 'apply' || 'plan' }}
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_r4_linode_token: ${{ secrets.TF_VAR_R4_LINODE_TOKEN }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
    defaults:
      run:
        working-directory: terraform/
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: make init
      - name: Terraform Validate
        run: make validate
      - name: Terraform Plan
        run: make plan
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: make apply-now
  ansible:
    name: Ansible ${{ github.ref == 'refs/heads/main' && 'apply' || 'diff' }}
    runs-on: ubuntu-latest
    needs: terraform
    env:
      R4_ANSIBLE_VAULT_KEY: ${{ secrets.R4_ANSIBLE_VAULT_KEY }}
      R4_LINODE_TOKEN: ${{ secrets.R4_LINODE_TOKEN }}
    defaults:
      run:
        working-directory: ansible/
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ANSIBLE_USER_PRIVATE_SSH_KEY }}
      - uses: astral-sh/setup-uv@v5
      - name: Install Ansible + galaxy deps
        run: |
          make install-ansible
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Ansible Diff (non-main dispatch)
        if: github.ref != 'refs/heads/main'
        run: SSH_USER=ansible make diff
      - name: Ansible Apply
        if: github.ref == 'refs/heads/main'
        run: SSH_USER=ansible make apply
