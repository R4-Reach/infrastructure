limit_req_zone $binary_remote_addr zone=mylimit:10m rate=3r/s;

server {
  server_name wnc-supply-sites.com www.wnc-supply-sites.com;

  location /logs/ {
    default_type         "text/plain";
    autoindex            on;
    alias                /var/log/docker/;
    auth_basic           "Restricted Content";
    auth_basic_user_file /etc/nginx/.htpasswd;
    types {
      text/plain log;
    }
  }

  location / {
    limit_req zone=mylimit burst=20 nodelay;
    proxy_pass              http://127.0.0.1:8080;
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_read_timeout    60;
  }

  rewrite ^/site-detail(.*)$ /supplies/site-detail$1 permanent;
  rewrite ^/needs(.*)$ /supplies/needs$1 permanent;


  listen [::]:443 ssl; # managed by Certbot
  listen 443 ssl; # managed by Certbot
  ssl_certificate /etc/letsencrypt/live/wnc-supply-sites.com/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/wnc-supply-sites.com/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

