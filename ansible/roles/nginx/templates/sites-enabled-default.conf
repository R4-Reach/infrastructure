## Various redirects below

## Prod redirect port 80 to 443
server {
  if ($host = www.wnc-supply-sites.com) {
      return 301 https://$host$request_uri;
  } # managed by Certbot

  if ($host = wnc-supply-sites.com) {
      return 301 https://$host$request_uri;
  } # managed by Certbot

  server_name wnc-supply-sites.com www.wnc-supply-sites.com;
  listen [::]:80 ipv6only=on;
  listen 80;
  return 404; # managed by Certbot
}

