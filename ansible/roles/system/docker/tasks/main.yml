---
# Install instructions from: https://docs.docker.com/engine/install/ubuntu/
- name: Add docker signing key
  become: true
  ansible.builtin.copy:
    src: gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    mode: '0644'
- name: Add apt repo listing
  become: true
  register: docker_apt_repo
  ansible.builtin.copy:
    src: docker.list
    dest: /etc/apt/sources.list.d/docker.list
    owner: root
    group: root
    mode: '0644'
- name: Install docker packages
  become: true
  ansible.builtin.apt:
    update_cache: '{{ docker_apt_repo.changed }}'
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
  environment:
    DEBIAN_FRONTEND: noninteractive
- name: Create docker group, add users to this group to allow them to run docker
    without sudo
  become: true
  ansible.builtin.group:
    name: docker
    state: present
