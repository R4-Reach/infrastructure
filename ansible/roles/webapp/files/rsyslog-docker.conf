# Managed by Ansible - do not edit manually
#
# Route Docker container logs into per-container files under /var/log/docker/,
# which nginx serves (read-only, basic-auth) at /logs/.
#
# The compose services log via the journald driver with tag "docker/<name>"
# (see docker-compose.yml.j2). journald forwards those messages to rsyslog
# (ForwardToSyslog=yes, set in the journald role).
#
# We match and extract on $syslogtag (the raw tag, which reliably keeps the
# "docker/" prefix) rather than $programname (whose handling of the "/" is
# version-dependent). The regex pulls "<name>" out of "docker/<name>" and we
# write it to /var/log/docker/<name>.log, then stop so these messages are not
# also written to /var/log/syslog.
template(name="DockerLogFile" type="string"
         string="/var/log/docker/%syslogtag:R,ERE,1,BLANK:docker/([^:[]+)--end%.log")

if $syslogtag startswith "docker/" then {
    action(type="omfile" dynaFile="DockerLogFile" fileCreateMode="0644" dirCreateMode="0755")
    stop
}
