---
# Reconcile the running stack with the compose file instead of restarting the
# systemd unit. `docker compose up -d` recreates only the services whose config
# actually changed, leaving everything else (crucially, the database) running.
# A systemd restart would ExecStop `docker compose down` first, needlessly
# bouncing Postgres and causing a much larger outage.
- name: Reload_webapp
  become: true
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: '{{ webapp_working_directory }}'
  changed_when: true
- name: Restart_rsyslog
  become: true
  ansible.builtin.service:
    name: rsyslog
    state: restarted
